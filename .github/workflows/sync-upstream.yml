name: Sync Upstream

on:
  schedule:
    # 每天北京时间 08:00 自动合并上游
    - cron: '0 0 * * *'
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write

jobs:
  sync-upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/FB208/OpenBidKit_Yibiao.git 2>/dev/null || git remote set-url upstream https://github.com/FB208/OpenBidKit_Yibiao.git
          git fetch upstream

      - name: Merge upstream/main
        run: |
          # 尝试合并 upstream/main 到 main
          git merge upstream/main --no-edit || {
            echo "Merge conflict detected. Aborting."
            git merge --abort
            exit 1
          }

      - name: Push to origin
        run: |
          # 推送合并后的代码到 origin/main
          git push origin main
          echo "✅ Upstream sync completed at $(date)" >> $GITHUB_STEP_SUMMARY
