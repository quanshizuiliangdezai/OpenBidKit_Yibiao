name: Sync Upstream

on:
  schedule:
    # 每 6 小时自动同步（北京时间 08:00 / 14:00 / 20:00 / 02:00）
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write  # 需要 push 权限

jobs:
  sync-upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0  # 完整历史，冲突恢复需要
          token: ${{ secrets.PAT }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run sync script
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
        run: |
          chmod +x .github/scripts/sync-upstream.sh
          bash .github/scripts/sync-upstream.sh
