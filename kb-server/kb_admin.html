<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>易标知识库 · 管理员审核</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system, "Microsoft YaHei", sans-serif; background: #f4f6fb; color: #1f2a44; margin: 0; padding: 24px; }
  .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.06); padding: 24px; max-width: 900px; margin: 0 auto; }
  h2 { margin-top: 0; color: #1f5fd6; }
  input { padding: 10px 12px; border: 1px solid #d4dbe8; border-radius: 8px; font-size: 14px; width: 220px; margin-right: 8px; }
  button { padding: 10px 16px; border: none; border-radius: 8px; background: #1f5fd6; color: #fff; font-size: 14px; cursor: pointer; }
  button:hover { background: #174bb0; }
  button.approve { background: #1aa260; }
  button.reject { background: #d9534f; }
  .row { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
  table { width: 100%; border-collapse: collapse; margin-top: 12px; }
  th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid #eef1f7; font-size: 14px; }
  th { background: #f7f9fc; color: #5b6b8c; }
  .tag { padding: 2px 8px; border-radius: 10px; font-size: 12px; }
  .tag.pending { background: #fff4e0; color: #c77700; }
  .tag.approved { background: #e6f7ee; color: #1aa260; }
  .tag.rejected { background: #fdecec; color: #d9534f; }
  #msg { color: #d9534f; margin-top: 8px; }
  .hidden { display: none; }
</style>
</head>
<body>
<div class="card">
  <h2>易标知识库 · 管理员审核台</h2>

  <div id="login">
    <div class="row">
      <input id="u" placeholder="管理员用户名">
      <input id="p" type="password" placeholder="密码">
      <button onclick="login()">登录</button>
    </div>
    <div id="msg"></div>
  </div>

  <div id="panel" class="hidden">
    <div class="row">
      <button onclick="loadPending()">刷新待审核</button>
      <button onclick="loadAll()">查看全部员工</button>
    </div>
    <div id="hint" style="color:#5b6b8c;font-size:13px;margin-bottom:8px"></div>
    <table id="tbl">
      <thead><tr><th>ID</th><th>用户名</th><th>姓名</th><th>部门</th><th>状态</th><th>操作</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<script>
let TOKEN = '';

async function login() {
  const u = document.getElementById('u').value.trim();
  const p = document.getElementById('p').value;
  const msg = document.getElementById('msg');
  msg.textContent = '';
  const r = await fetch('/api/login', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ username: u, password: p })
  });
  const j = await r.json();
  if (!r.ok) { msg.textContent = j.error || '登录失败'; return; }
  if (j.data.role !== 'admin') { msg.textContent = '该账号不是管理员'; return; }
  TOKEN = j.data.token;
  document.getElementById('login').classList.add('hidden');
  document.getElementById('panel').classList.remove('hidden');
  loadPending();
}

async function loadPending() {
  document.getElementById('hint').textContent = '仅显示待审核申请';
  const r = await fetch('/api/admin/pending', { headers: { Authorization: 'Bearer ' + TOKEN } });
  const j = await r.json();
  render(j.data || []);
}

async function loadAll() {
  document.getElementById('hint').textContent = '全部员工';
  const r = await fetch('/api/admin/employees', { headers: { Authorization: 'Bearer ' + TOKEN } });
  const j = await r.json();
  render(j.data || [], true);
}

function render(list, showAll) {
  const tb = document.querySelector('#tbl tbody');
  tb.innerHTML = '';
  if (!list.length) { tb.innerHTML = '<tr><td colspan="6" style="color:#999">暂无数据</td></tr>'; return; }
  list.forEach(e => {
    const tr = document.createElement('tr');
    const statusMap = { pending: ['pending', '待审核'], approved: ['approved', '已通过'], rejected: ['rejected', '已拒绝'] };
    const [cls, txt] = statusMap[e.status] || ['pending', e.status];
    let action = '';
    if (e.status === 'pending') {
      action = '<button class="approve" onclick="review(' + e.id + ', \'approve\')">通过</button> '
             + '<button class="reject" onclick="review(' + e.id + ', \'reject\')">拒绝</button>';
    } else if (!showAll) {
      action = '—';
    } else {
      action = '—';
    }
    tr.innerHTML = '<td>' + e.id + '</td><td>' + esc(e.username) + '</td><td>' + esc(e.display_name)
      + '</td><td>' + esc(e.department || '') + '</td><td><span class="tag ' + cls + '">' + txt + '</span></td><td>' + action + '</td>';
    tb.appendChild(tr);
  });
}

async function review(id, action) {
  await fetch('/api/admin/review', {
    method: 'POST',
    headers: {'Content-Type': 'application/json', Authorization: 'Bearer ' + TOKEN},
    body: JSON.stringify({ user_id: id, action })
  });
  loadPending();
}

function esc(s) {
  return (s || '').replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
}
</script>
</body>
</html>
